<!DOCTYPE html>
<html lang="en">
    <head>
<meta charset="UTF-8">
<title>MyFirstProject</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="styles.css">
<style>
</style>
</head>
<body>
   <div class="container"> 
    <div id="MyClockDisplay" class="item clock" onload="showTime()"></div>
   <div id ="date" class="item date" onload="shoWdate()">lkdfkggkl</div>
   <div class="box">
    <div class="screen">0</div>
    <div class="panel">
      <div class="first line">
        <button id='1'>1</button>
        <button id='2'>2</button>
        <button id='3'>3</button>
        <button class="operators" id='plus'>+</button>
      </div>
      <div class="second line">
        <button id='4'>4</button>
        <button id='5'>5</button>
        <button id='6'>6</button>
        <button class="operators" id='minus'>-</button>
      </div>
      <div class="third line">
        <button id='7'>7</button>
        <button id='8'>8</button>
        <button id='9'>9</button>
        <button class="operators" id='multiply'>*</button>
      </div>
       <div class="third line">
        <button id='0'>0</button>
        <button id='point'>.</button>
        <button id='clear'>C</button>
        <button class="operators" id='divide'>/</button>
      </div>
    </div>
    <div class="last line">
      <button id='equal'>=</button>
    </div>
  </div>
  
    </div>
<script src="automated.js"></script>
</body>
</html>
